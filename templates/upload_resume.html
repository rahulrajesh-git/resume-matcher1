
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Upload Resume</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; color: #333; }
        h1 { color: #0056b3; }
        form { background-color: #fff; padding: 20px; border-radius: 5px; display: inline-block; }
        input[type="file"], input[type="submit"] { padding: 10px; margin: 5px 0; }
        input[type="submit"] { background-color: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        input[type="submit"]:hover { background-color: #0056b3; }
        .button-link { display: inline-block; margin-top: 10px; padding: 10px 15px; background-color: #28a745; color: white; text-decoration: none; border-radius: 5px; }
        .button-link:hover { background-color: #218838; }
        .back-link { display: inline-block; margin-top: 10px; padding: 10px 15px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 5px; margin-left: 10px; }
        .back-link:hover { background-color: #5a6268; }
    </style>
</head>
<body>
    <h1>Upload Resume for Job ID: {{ job_id }}</h1>
    <form method="post" enctype="multipart/form-data">
        <input type="file" name="resume_file" accept=".txt,.pdf,.doc,.docx" required>
        <input type="submit" value="Upload Resume">
    </form>
    <br>
    <a href="/match_resumes/{{ job_id }}" class="button-link">Match Resumes & View Results</a>
    <a href="/job_descriptions" class="back-link">Back to Job Descriptions</a>
</body>
</html>
