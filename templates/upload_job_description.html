
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Create Job Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; color: #333; }
        h1 { color: #0056b3; }
        .form-container { background-color: #fff; padding: 30px; border-radius: 5px; max-width: 600px; margin: 0 auto; }
        form { margin-top: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input[type="text"], input[type="email"], input[type="file"] { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 3px; 
            box-sizing: border-box;
            font-size: 14px;
        }
        input[type="text"]:focus, input[type="email"]:focus, input[type="file"]:focus { 
            outline: none; 
            border-color: #007bff; 
            box-shadow: 0 0 5px rgba(0,123,255,0.5);
        }
        input[type="submit"] { 
            background-color: #28a745; 
            color: white; 
            padding: 12px 30px; 
            border: none; 
            border-radius: 3px; 
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        input[type="submit"]:hover { background-color: #218838; }
        .back-link { 
            display: inline-block; 
            padding: 10px 15px; 
            background-color: #6c757d; 
            color: white; 
            text-decoration: none; 
            border-radius: 5px; 
            margin-top: 20px;
        }
        .back-link:hover { background-color: #5a6268; text-decoration: none; }
        .required { color: red; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Create New Job Form</h1>
        
        <form method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="job_title">Job Title <span class="required">*</span></label>
                <input type="text" id="job_title" name="job_title" required placeholder="e.g., Senior Software Engineer">
            </div>

            <div class="form-group">
                <label for="recruiter_email">Your Email Address <span class="required">*</span></label>
                <input type="email" id="recruiter_email" name="recruiter_email" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="job_description_file">Job Description File <span class="required">*</span></label>
                <input type="file" id="job_description_file" name="job_description_file" accept=".txt,.pdf,.doc,.docx" required>
                <small style="color: #666; margin-top: 5px; display: block;">Upload a text, PDF, or Word document with the job description</small>
            </div>

            <input type="submit" value="Create Job Form">
        </form>

        <a href="/recruiter" class="back-link">Back to Dashboard</a>
    </div>
</body>
</html>
