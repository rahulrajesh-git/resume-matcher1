
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Job Descriptions</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; color: #333; }
        h1 { color: #0056b3; }
        a { color: #007bff; text-decoration: none; margin-right: 10px; }
        a:hover { text-decoration: underline; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: #fff; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; font-weight: bold; }
        .button-link { display: inline-block; padding: 8px 12px; background-color: #007bff; color: white; text-decoration: none; border-radius: 3px; margin: 2px; }
        .button-link:hover { background-color: #0056b3; text-decoration: none; }
        .delete-button { display: inline-block; padding: 8px 12px; background-color: #dc3545; color: white; border: none; border-radius: 3px; margin: 2px; cursor: pointer; font-size: 14px; }
        .delete-button:hover { background-color: #c82333; }
        .upload-new { display: inline-block; padding: 10px 15px; background-color: #28a745; color: white; text-decoration: none; border-radius: 5px; margin-bottom: 20px; }
        .upload-new:hover { background-color: #218838; text-decoration: none; }
    </style>
</head>
<body>
    <h1>Job Descriptions</h1>
    <a href="/upload_job_description" class="upload-new">Upload New Job Description</a>
    <hr>
    {% if job_descriptions %}
    <table border="1">
        <thead>
            <tr>
                <th>Job ID</th>
                <th>Original Filename</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for job in job_descriptions %}
            <tr>
                <td>{{ job.job_id }}</td>
                <td>{{ job.original_filename }}</td>
                <td>
                    <a href="/upload_resume/{{ job.job_id }}" class="button-link">Upload Resumes</a>
                    <a href="/match_resumes/{{ job.job_id }}" class="button-link">Match & View Results</a>
                    <form method="POST" action="/delete_job/{{ job.job_id }}" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this job and all associated resumes?');">
                        <button type="submit" class="delete-button">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p>No job descriptions uploaded yet.</p>
    {% endif %}
</body>
</html>
